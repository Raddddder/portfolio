<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 光的渐变 — 从白到暖金 -->
    <linearGradient id="light1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f5eedd"/>
      <stop offset="100%" stop-color="#c8b898"/>
    </linearGradient>
    <!-- 光晕 -->
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 混凝土质感 -->
    <filter id="concrete1">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- 混凝土底 -->
  <rect width="512" height="512" rx="56" fill="#2a2a26" filter="url(#concrete1)"/>
  <!-- 暗角加深 -->
  <rect width="512" height="512" rx="56" fill="url(#darkCorner1)" opacity="0.3"/>
  
  <!-- H 光缝 -->
  <g filter="url(#glow1)">
    <!-- 左竖缝 -->
    <rect x="168" y="108" width="10" height="296" rx="2" fill="url(#light1)" opacity="0.95"/>
    <!-- 右竖缝 -->
    <rect x="334" y="108" width="10" height="296" rx="2" fill="url(#light1)" opacity="0.95"/>
    <!-- 横缝 -->
    <rect x="168" y="251" width="176" height="10" rx="2" fill="url(#light1)" opacity="0.9"/>
  </g>
  
  <!-- 光线散射（地面投影） -->
  <polygon points="168,404 148,460 192,460" fill="#c8b898" opacity="0.08"/>
  <polygon points="334,404 314,460 358,460" fill="#c8b898" opacity="0.08"/>
</svg>
