<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- H6：极致留白 — 7 个点构成 H -->
  <rect width="512" height="512" rx="56" fill="#fafaf8"/>
  
  <!-- 极淡辅助网格线 -->
  <g stroke="#e8e7e4" stroke-width="0.5" opacity="0.35">
    <line x1="186" y1="90" x2="186" y2="422"/>
    <line x1="256" y1="90" x2="256" y2="422"/>
    <line x1="326" y1="90" x2="326" y2="422"/>
    <line x1="146" y1="146" x2="366" y2="146"/>
    <line x1="146" y1="256" x2="366" y2="256"/>
    <line x1="146" y1="366" x2="366" y2="366"/>
  </g>
  
  <!-- H 由 7 个点构成 -->
  <g fill="#1a1a18">
    <!-- 左竖 3 点 -->
    <circle cx="186" cy="146" r="14"/>
    <circle cx="186" cy="256" r="14"/>
    <circle cx="186" cy="366" r="14"/>
    <!-- 右竖 3 点 -->
    <circle cx="326" cy="146" r="14"/>
    <circle cx="326" cy="256" r="14"/>
    <circle cx="326" cy="366" r="14"/>
  </g>
  <!-- 中心连接点（桧木色） -->
  <circle cx="256" cy="256" r="14" fill="#c8b898"/>
</svg>
