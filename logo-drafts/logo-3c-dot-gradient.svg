<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 变体C：渐变点阵 + 贯穿的 S 曲线 -->
  <rect width="512" height="512" rx="56" fill="#f5f5f4"/>
  
  <!-- 渐变点阵：左上密 → 右下疏 -->
  <g fill="#d4d2ce">
    <!-- 密集区（左上） -->
    <circle cx="60" cy="60" r="3"/><circle cx="100" cy="60" r="3"/><circle cx="140" cy="60" r="3"/>
    <circle cx="60" cy="100" r="3"/><circle cx="100" cy="100" r="3"/><circle cx="140" cy="100" r="3"/>
    <circle cx="60" cy="140" r="3"/><circle cx="100" cy="140" r="3"/><circle cx="140" cy="140" r="3"/>
    <!-- 中密度 -->
    <circle cx="60" cy="200" r="2.5"/><circle cx="120" cy="200" r="2.5"/>
    <circle cx="60" cy="260" r="2.5"/>
    <circle cx="200" cy="60" r="2.5"/><circle cx="260" cy="60" r="2.5"/>
    <circle cx="200" cy="120" r="2.5"/>
    <!-- 稀疏区（右下） -->
    <circle cx="452" cy="352" r="2"/><circle cx="452" cy="412" r="2"/>
    <circle cx="392" cy="452" r="2"/><circle cx="452" cy="452" r="2"/>
    <circle cx="352" cy="412" r="2"/><circle cx="412" cy="452" r="2"/>
    <circle cx="352" cy="352" r="2"/>
  </g>
  
  <!-- S 曲线 — 优雅的衬线感 -->
  <path d="M 340 120 C 280 120 180 120 180 120 
           C 145 120 120 145 120 180 
           C 120 220 150 245 190 255 
           L 320 285 
           C 360 295 390 320 390 360 
           C 390 400 360 420 320 420 
           L 170 420"
        fill="none" stroke="#1a1a18" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- S 上下端点的衬线短横 -->
  <line x1="340" y1="108" x2="340" y2="132" stroke="#1a1a18" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="408" x2="170" y2="432" stroke="#1a1a18" stroke-width="3" stroke-linecap="round"/>
</svg>
