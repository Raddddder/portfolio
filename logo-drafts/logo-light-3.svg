<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="light3v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f5eedd"/>
      <stop offset="100%" stop-color="#c8b898" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="light3h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8b898" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8b898" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient3">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <clipPath id="roundRect3">
      <rect width="512" height="512" rx="56"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#roundRect3)">
    <!-- 深色混凝土 -->
    <rect width="512" height="512" fill="#1e1e1c"/>
    
    <!-- 混凝土板缝 -->
    <g stroke="#2a2a26" stroke-width="1" opacity="0.5">
      <line x1="0" y1="170" x2="512" y2="170"/>
      <line x1="0" y1="342" x2="512" y2="342"/>
      <line x1="170" y1="0" x2="170" y2="512"/>
      <line x1="342" y1="0" x2="342" y2="512"/>
    </g>
    
    <!-- 环境光晕 -->
    <rect x="206" y="56" width="100" height="400" fill="#f5eedd" opacity="0.03" filter="url(#ambient3)"/>
    
    <!-- H 光缝 -->
    <g filter="url(#glow3)">
      <!-- 左竖光缝 -->
      <rect x="186" y="86" width="8" height="340" rx="1" fill="url(#light3v)"/>
      <!-- 右竖光缝 -->
      <rect x="318" y="86" width="8" height="340" rx="1" fill="url(#light3v)"/>
      <!-- 中横光缝（H 的核心横梁） -->
      <rect x="186" y="248" width="140" height="8" rx="1" fill="url(#light3h)"/>
    </g>
    
    <!-- 光束粒子（模拟灰尘） -->
    <g fill="#ffffff" opacity="0.15">
      <circle cx="192" cy="180" r="1"/>
      <circle cx="188" cy="220" r="0.8"/>
      <circle cx="194" cy="300" r="0.6"/>
      <circle cx="322" cy="160" r="0.8"/>
      <circle cx="320" cy="280" r="1"/>
      <circle cx="324" cy="350" r="0.6"/>
      <circle cx="230" cy="252" r="0.8"/>
      <circle cx="280" cy="250" r="0.7"/>
    </g>
  </g>
</svg>
