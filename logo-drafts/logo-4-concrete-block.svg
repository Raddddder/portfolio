<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 方案4：混凝土块 + 竖线切割的 W -->
  <rect width="512" height="512" rx="0" fill="#1a1a18"/>
  <!-- 内切混凝土面 -->
  <rect x="32" y="32" width="448" height="448" fill="#e0dfdc"/>
  <!-- 用竖线条构成抽象 W -->
  <line x1="130" y1="160" x2="180" y2="360" stroke="#1a1a18" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="360" x2="240" y2="220" stroke="#1a1a18" stroke-width="14" stroke-linecap="round"/>
  <line x1="260" y1="220" x2="300" y2="360" stroke="#1a1a18" stroke-width="14" stroke-linecap="round"/>
  <line x1="320" y1="360" x2="370" y2="160" stroke="#1a1a18" stroke-width="14" stroke-linecap="round"/>
  <!-- 桧木色底线 -->
  <line x1="130" y1="390" x2="370" y2="390" stroke="#c8b898" stroke-width="2.5"/>
</svg>