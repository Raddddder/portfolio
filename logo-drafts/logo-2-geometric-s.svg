<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 方案2：几何蓝图式 S -->
  <rect width="512" height="512" rx="64" fill="#fafaf8"/>
  <!-- 外框 -->
  <rect x="24" y="24" width="464" height="464" rx="4" fill="none" stroke="#1a1a18" stroke-width="2"/>
  <!-- 几何 S：用三条水平线 + 两条竖线组合 -->
  <path d="M 170 140 L 342 140 L 342 240 L 170 240 L 170 372 L 342 372" 
        fill="none" stroke="#1a1a18" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- 桧木色点缀角标 -->
  <rect x="24" y="24" width="40" height="3" fill="#c8b898"/>
  <rect x="24" y="24" width="3" height="40" fill="#c8b898"/>
  <rect x="448" y="485" width="40" height="3" fill="#c8b898"/>
  <rect x="485" y="448" width="3" height="40" fill="#c8b898"/>
</svg>