<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="light6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f5eedd"/>
      <stop offset="100%" stop-color="#c8b898" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotglow6">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundRect6">
      <rect width="512" height="512" rx="56"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#roundRect6)">
    <!-- 混凝土暗面 -->
    <rect width="512" height="512" fill="#201f1d"/>
    
    <!-- 混凝土板缝 -->
    <g stroke="#2a2a26" stroke-width="0.5" opacity="0.4">
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
    </g>
    
    <!-- H 光缝 -->
    <g filter="url(#glow6)">
      <rect x="178" y="100" width="9" height="312" rx="1.5" fill="url(#light6)" opacity="0.9"/>
      <rect x="325" y="100" width="9" height="312" rx="1.5" fill="url(#light6)" opacity="0.9"/>
      <rect x="187" y="252" width="138" height="7" rx="1" fill="url(#light6)" opacity="0.8"/>
    </g>
    
    <!-- 光点散落（点阵元素 — 像光穿过混凝土小孔） -->
    <g filter="url(#dotglow6)">
      <!-- 光缝附近的散落光点 -->
      <circle cx="158" cy="140" r="2" fill="#f5eedd" opacity="0.3"/>
      <circle cx="148" cy="200" r="1.5" fill="#f5eedd" opacity="0.2"/>
      <circle cx="155" cy="320" r="2" fill="#f5eedd" opacity="0.25"/>
      <circle cx="350" cy="160" r="1.5" fill="#f5eedd" opacity="0.2"/>
      <circle cx="355" cy="300" r="2" fill="#f5eedd" opacity="0.3"/>
      <circle cx="345" cy="370" r="1.5" fill="#f5eedd" opacity="0.2"/>
      
      <!-- 远处更微弱的光点 -->
      <circle cx="100" cy="180" r="1.2" fill="#c8b898" opacity="0.12"/>
      <circle cx="420" cy="220" r="1.2" fill="#c8b898" opacity="0.12"/>
      <circle cx="110" cy="350" r="1" fill="#c8b898" opacity="0.1"/>
      <circle cx="400" cy="340" r="1" fill="#c8b898" opacity="0.1"/>
      
      <!-- 横缝旁的光点 -->
      <circle cx="220" cy="240" r="1.5" fill="#f5eedd" opacity="0.2"/>
      <circle cx="270" cy="268" r="1.5" fill="#f5eedd" opacity="0.2"/>
      <circle cx="310" cy="245" r="1.2" fill="#f5eedd" opacity="0.15"/>
    </g>
  </g>
</svg>
