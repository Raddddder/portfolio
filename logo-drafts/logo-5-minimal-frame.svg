<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 方案5：原研哉式极简 —— 大量留白 + 一个细小的 s -->
  <rect width="512" height="512" rx="64" fill="#1a1a18"/>
  <!-- 极细正方形内框 -->
  <rect x="80" y="80" width="352" height="352" rx="2" fill="none" stroke="#fafaf8" stroke-width="1" opacity="0.25"/>
  <!-- 精致小写 s，Cormorant 风格的衬线感 -->
  <text x="256" y="320" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-weight="300" font-size="260" fill="#fafaf8" opacity="0.9" font-style="italic">s</text>
</svg>